name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install dir
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: SPDX
        run: bun run spdx

      - name: Build widget package
        run: bun run build:widget

      - name: Build CLI
        run: bun run build:cli

      - name: Build daemon
        run: bun run build:daemon

      - name: Test
        run: bun test

      - name: Binary size guard
        run: |
          soft=$((150 * 1024 * 1024))
          hard=$((200 * 1024 * 1024))
          for bin in dist/sticky dist/sticky-watcherd; do
            size=$(stat -c%s "$bin")
            human=$(numfmt --to=iec --suffix=B "$size")
            echo "$bin: $human ($size bytes)"
            if [ "$size" -gt "$hard" ]; then
              echo "::error::$bin $human exceeds hard ceiling $(numfmt --to=iec --suffix=B $hard)"
              exit 1
            fi
            if [ "$size" -gt "$soft" ]; then
              echo "::warning::$bin $human exceeds soft ceiling $(numfmt --to=iec --suffix=B $soft) — investigate before release"
            fi
          done

      - name: CLI cold-start guard
        run: |
          runs=5
          budget_ms=100
          times_ms=()
          for _ in $(seq "$runs"); do
            t=$( { /usr/bin/time -f '%e' dist/sticky --version >/dev/null ; } 2>&1 )
            ms=$(awk -v s="$t" 'BEGIN{printf "%.0f", s*1000}')
            times_ms+=("$ms")
          done
          sorted=($(printf '%s\n' "${times_ms[@]}" | sort -n))
          median=${sorted[$((runs/2))]}
          echo "cold-start (ms): runs=[${times_ms[*]}]  median=${median}  budget=${budget_ms}"
          if [ "$median" -gt "$budget_ms" ]; then
            echo "::error::dist/sticky --version median ${median}ms exceeds ${budget_ms}ms budget"
            exit 1
          fi

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: sticky-cli
          path: dist/sticky
          if-no-files-found: error

      - name: Upload daemon artifact
        uses: actions/upload-artifact@v7
        with:
          name: sticky-watcherd
          path: dist/sticky-watcherd
          if-no-files-found: error

      - name: Upload widget package
        uses: actions/upload-artifact@v7
        with:
          name: sticky-widget
          path: package
          if-no-files-found: error

  qml:
    name: QML lint/format/test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build QML container image
        run: podman build -t localhost/totvibe-qml:qt6 -f scripts/qml.Dockerfile .

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build widget package
        run: bun run build:widget

      - name: qmllint
        run: bun run qml:lint

      - name: qmlformat --check
        run: bun run qml:format

      - name: qmltestrunner
        run: bun run qml:test

  ci-gate:
    name: ci-gate
    needs: [check, qml]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: verify all upstream jobs succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}" == "true" ]]; then
            echo "one or more upstream jobs did not succeed"
            exit 1
          fi
